<!DOCTYPE html>
<html>
<head>

<title>BGMagic</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
padding-top:50px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
font-size:16px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

img{
margin-top:20px;
max-width:100%;
}

</style>

</head>

<body>

<div class="container">

<h1>BGMagic</h1>

<p>Upload image to remove background</p>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image" id="imageInput">

<br><br>

<button type="submit">Remove Background</button>

</form>

<img id="preview">

</div>

<script>

document.getElementById("imageInput").onchange = function(evt){

const [file] = this.files

if(file){

document.getElementById("preview").src = URL.createObjectURL(file)

}

}

</script>

</body>
</html>
