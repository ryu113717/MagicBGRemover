<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicBGRemover</title>
</head>
<body>
    <h1>MagicBGRemover</h1>
    <p>画像をアップロードすると背景を削除します</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <br><br>
        <button type="submit">背景削除</button>
    </form>
</body>
</html>
